<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALQUIPC - Sistema de Facturación</title>

<style>

body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: cadetblue;
    margin: 0;
    padding: 0;
}

.container{
    width: 80%;
    max-width: 450px;
    margin: 50px auto;
    background-color: whitesmoke;
    padding: 25px;
}

h1{
    text-align: center;
    color: #2c3e50;
}

p{
    text-align: center;
    color: gray;
}

label{
    font-weight: bold;
    display: block;
    margin-top: 15px;
}


label{
    font-weight: bold;
    display: block;
    margin-top: 15px;
}

input, select{
    width: 100%;
    padding: 10px;
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

input:focus, select:focus{
    border-color: #4ca1af;
    outline: none;
}

button{
    width: 100%;
    margin-top: 20px;
    padding: 12px;
    background-color: black;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover{
    background-color: #4ca1af;
}

.footer{
    text-align: center;
    margin-top: 20px;
    font-size: 13px;
    color: #555;
}



label{
    font-weight: bold;
    display: block;
    margin-top: 15px;
}

input, select{
    width: 100%;
    padding: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Facturación ALQUIPC</h1>
    <p>Sistema de alquiler de equipos portátiles</p>

    <form>
        <label>Nombre del cliente</label>
        <input type="text" id="nombre" placeholder="Ej: Juan Garcia" required>

        <label>Correo del cliente</label>
        <input type="email" id="email" placeholder="Ej: correo@example.com" required>

        <label>Número de equipos (mínimo 2)</label>
        <input type="number" min="2" placeholder="Ej: 3">

        <label>Días iniciales de alquiler</label>
        <input type="number" min="1" placeholder="Ej: 5">

        <label>Días adicionales</label>
        <input type="number" min="0" placeholder="Ej: 2">

        <label for="tipo">Tipo de alquiler</label>
<select name="tipo" id="tipo">
    <option value="dentro">Dentro de la ciudad</option>
    <option value="fuera">Fuera de la ciudad (+5%)</option>
    <option value="establecimiento">Dentro del establecimiento (-5%)</option>
</select>
            
        

        <button type="button" onclick="calcular()">Generar Factura</button>

    </form>

    <div id="resultado"></div>

    <div class="footer">
        Kevin Garcia SENA
    </div>
</div>

<script src="factura.js"></script>
</body>
